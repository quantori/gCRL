name: gcrl
channels:
  - conda-forge
  - defaults
dependencies:
  # Core scientific stack
  - python=3.10
  - anndata>=0.10
  - scanpy>=1.9
  - numpy
  - pandas
  - scikit-learn
  - pytorch
  - matplotlib
  - tqdm
  - scipy
  - networkx
  - statsmodels

  # GRN / community detection
  - python-igraph
  - leidenalg
  - gseapy
  - goatools

  # Dimensionality reduction
  - umap-learn

  # Development / testing tools
  - jupyterlab
  - notebook
  - pytest
  - pytest-cov
  - black
  - flake8
  - isort
  - pre-commit

  # Ensure pip is present
  - pip
